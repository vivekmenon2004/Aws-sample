{% extends "phones/base.html" %}
{% block title %}Delete Phone - PhoneStore{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete</h5>
      </div>
      <div class="card-body text-center py-5">
        <p class="fs-5">Are you sure you want to delete</p>
        <p class="fw-bold fs-4 text-danger">{{ phone }}</p>
        <p class="text-muted">This action cannot be undone.</p>
        <form method="post" class="d-flex gap-3 justify-content-center mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-trash me-1"></i> Yes, Delete
          </button>
          <a href="{% url 'phone_detail' phone.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
