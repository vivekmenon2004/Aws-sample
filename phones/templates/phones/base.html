<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PhoneStore{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background: #f0f2f5; }
    .navbar { background: linear-gradient(90deg, #1e3a5f, #2563eb); }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
    .badge-new { background-color: #22c55e; }
    .badge-used { background-color: #f59e0b; }
    .badge-refurbished { background-color: #6366f1; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark navbar-expand-md mb-4 py-3">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="{% url 'phone_list' %}">
      <i class="bi bi-phone-fill me-2"></i>PhoneStore
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="{% url 'phone_list' %}"><i class="bi bi-grid"></i> Phones</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'phone_add' %}"><i class="bi bi-plus-circle"></i> Add Phone</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'brand_list' %}"><i class="bi bi-tags"></i> Brands</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin/"><i class="bi bi-gear"></i> Admin</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mb-5">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
        {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
